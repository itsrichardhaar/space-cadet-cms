<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Space Cadet CMS</title>
    <!-- Apply saved theme + appearance before first paint to prevent flash -->
    <script>
      (function(){
        try{
          var ls=localStorage,
              th=ls.getItem('sc-theme'),
              hu=parseFloat(ls.getItem('sc-hue')||'38'),
              br=parseFloat(ls.getItem('sc-brightness')||'100'),
              it=parseFloat(ls.getItem('sc-intensity')||'0'),
              el=document.documentElement;

          // Base theme via data-theme attribute
          if(th==='dark'||th==='light') el.setAttribute('data-theme',th);

          // Only compute inline overrides when non-default
          if(hu!==38||br!==100||it!==0){
            var S={
              mid: {bg:[30,3,53],sf:[30,4,60],s2:[30,4,68],in:[30,3,44]},
              dark:{bg:[30,8,15],sf:[30,7,19],s2:[30,7,22],in:[30,9,12]},
              light:{bg:[38,8,74],sf:[38,8,80],s2:[38,8,85],in:[38,8,69]}
            };
            var b=S[th]||S.mid, ia=it/100, sr=br/100;

            function lh(a,b_,t){var d=((b_-a+540)%360)-180;return((a+d*t)%360+360)%360}
            function tn(c){return'hsl('+lh(c[0],hu,ia).toFixed(1)+','+(c[1]+ia*26).toFixed(1)+'%,'+Math.max(0,Math.min(98,c[2]*sr)).toFixed(1)+'%)'}
            function h2r(h,s,l){s/=100;l/=100;var a=s*Math.min(l,1-l),f=function(n){var k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1))};return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)]}

            var st=el.style;
            st.setProperty('--sc-bg',      tn(b.bg));
            st.setProperty('--sc-surface',  tn(b.sf));
            st.setProperty('--sc-surface-2',tn(b.s2));
            st.setProperty('--sc-inset',    tn(b.in));

            var asl=th==='light'?[72,44]:[88,54],
                hsl=th==='light'?[74,38]:[90,48],
                rgb=h2r(hu,asl[0],asl[1]),
                hov=h2r(hu,hsl[0],hsl[1]);

            st.setProperty('--sc-accent',      'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')');
            st.setProperty('--sc-accent-rgb',   rgb[0]+', '+rgb[1]+', '+rgb[2]);
            st.setProperty('--sc-accent-hover','rgb('+hov[0]+','+hov[1]+','+hov[2]+')');
            st.setProperty('--sc-accent-soft', 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.16)');
          }
        }catch(e){}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
